<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Elevator Digital Twin - Diploma Project</title>
<style>
    body {
        background: #1a1a1a;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: 'Segoe UI', Arial, sans-serif;
        color: white;
        margin: 0;
    }

    .container {
        display: flex;
        background: #2c3e50;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        border: 1px solid #34495e;
    }

    .panel {
        margin-left: 40px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        min-width: 220px;
    }

    .display {
        background: #000;
        color: #00ff00;
        font-family: 'Courier New', monospace;
        font-size: 32px;
        padding: 15px;
        border-radius: 8px;
        text-align: center;
        border: 2px solid #444;
        margin-bottom: 20px;
        box-shadow: inset 0 0 10px #00ff0033;
    }

    button {
        padding: 12px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        border: none;
        border-radius: 8px;
        background: #ecf0f1;
        color: #2c3e50;
        transition: all 0.2s;
    }

    button:hover { background: #bdc3c7; transform: translateY(-2px); }
    button:active { transform: translateY(0); }

    button.active {
        background: #f39c12;
        color: white;
        box-shadow: 0 0 15px #f39c12;
    }

    .arduino-btn {
        background: #27ae60;
        color: white;
        margin-top: 20px;
    }
    
    .arduino-btn:hover { background: #2ecc71; }

    h3 {
        margin: 10px 0 5px 0;
        font-size: 12px;
        text-transform: uppercase;
        color: #bdc3c7;
        letter-spacing: 1px;
    }
</style>
</head>
<body>

<div class="container">
    <svg width="220" height="420" viewBox="0 0 220 420" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <linearGradient id="shaftGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" style="stop-color:#2c3e50"/><stop offset="50%" style="stop-color:#34495e"/><stop offset="100%" style="stop-color:#2c3e50"/>
            </linearGradient>
            <linearGradient id="cabinGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" style="stop-color:#ecf0f1"/><stop offset="100%" style="stop-color:#bdc3c7"/>
            </linearGradient>
            <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
                <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
            </filter>
        </defs>

        <rect x="60" y="20" width="100" height="380" fill="url(#shaftGradient)" stroke="#95a5a6" stroke-width="2" rx="10" filter="url(#shadow)"/>

        <g id="elevatorGroup">
            <rect id="cabin" x="70" y="300" width="80" height="60" fill="url(#cabinGradient)" stroke="#2c3e50" stroke-width="2" rx="8" filter="url(#shadow)"/>
            <rect id="doorLeft" x="70" y="300" width="40" height="60" fill="rgba(255,255,255,0.2)" stroke="#7f8c8d" rx="2"/>
            <rect id="doorRight" x="110" y="300" width="40" height="60" fill="rgba(0,0,0,0.15)" stroke="#7f8c8d" rx="2"/>
        </g>
    </svg>

    <div class="panel">
        <div class="display">FLOOR: <span id="floorDisplay">1</span></div>
        
        <h3>В кабине</h3>
        <button onclick="callElevator(1)">1 ЭТАЖ</button>
        <button onclick="callElevator(2)">2 ЭТАЖ</button>
        <button onclick="callElevator(3)">3 ЭТАЖ</button>

        <h3>Снаружи</h3>
        <button onclick="callElevator(1)">ВЫЗОВ 1</button>
        <button onclick="callElevator(2)">ВЫЗОВ 2</button>
        <button onclick="callElevator(3)">ВЫЗОВ 3</button>

        <button class="arduino-btn" onclick="connectArduino()">ПОДКЛЮЧИТЬ ПЛАТУ</button>
    </div>
</div>

<script>
let currentFloor = 1;
let queue = [];
let moving = false;
let doorOffset = 0; // 0 - закрыты, 40 - полностью открыты
const doorDelay = 1500; 

const floorsY = { 1: 300, 2: 170, 3: 40 };

function updateDisplay() {
    document.getElementById("floorDisplay").innerText = currentFloor;
}

function callElevator(floor) {
    if (currentFloor === floor && !moving && doorOffset === 0) {
        openDoors(() => {}); 
        return;
    }
    if (!queue.includes(floor)) {
        queue.push(floor);
        highlightButton(floor);
    }
    processQueue();
}

function highlightButton(floor) {
    document.querySelectorAll("button").forEach(btn => {
        if (btn.innerText.includes(floor)) btn.classList.add("active");
    });
}

function clearHighlight(floor) {
    document.querySelectorAll("button").forEach(btn => {
        if (btn.innerText.includes(floor)) btn.classList.remove("active");
    });
}

function processQueue() {
    if (moving || queue.length === 0) return;
    const target = queue.shift();
    moveToFloor(target);
}

function moveToFloor(targetFloor) {
    moving = true;
    
    // 1. Сначала ГАРАНТИРОВАННО закрываем двери перед поездкой
    closeDoors(() => {
        const group = document.getElementById("elevatorGroup");
        const cabin = document.getElementById("cabin");
        const doorL = document.getElementById("doorLeft");
        const doorR = document.getElementById("doorRight");
        const targetY = floorsY[targetFloor];
        let currentY = parseInt(cabin.getAttribute("y"));

        let moveInterval = setInterval(() => {
            if (currentY > targetY) currentY -= 1;
            else if (currentY < targetY) currentY += 1;

            // Двигаем всю конструкцию по вертикали
            [cabin, doorL, doorR].forEach(el => el.setAttribute("y", currentY));

            if (currentY === targetY) {
                clearInterval(moveInterval);
                currentFloor = targetFloor;
                updateDisplay();

                // 2. Приехали -> Открываем (оно само закроется через callback)
                openDoors(() => {
                    clearHighlight(targetFloor);
                    moving = false;
                    setTimeout(processQueue, 400);
                });
            }
        }, 10);
    });
}

function openDoors(callback) {
    const left = document.getElementById("doorLeft");
    const right = document.getElementById("doorRight");

    let interval = setInterval(() => {
        if (doorOffset < 38) {
            doorOffset += 1;
            drawDoors(left, right);
        } else {
            clearInterval(interval);
            // Двери открылись. Ждем и вызываем закрытие
            setTimeout(() => {
                closeDoors(callback);
            }, doorDelay);
        }
    }, 20);
}

function closeDoors(callback) {
    const left = document.getElementById("doorLeft");
    const right = document.getElementById("doorRight");

    // Если уже закрыты - сразу выходим
    if (doorOffset <= 0) {
        if (callback) callback();
        return;
    }

    let interval = setInterval(() => {
        if (doorOffset > 0) {
            doorOffset -= 1;
            drawDoors(left, right);
        } else {
            clearInterval(interval);
            if (callback) callback();
        }
    }, 20);
}

// Вспомогательная функция, которая просто рисует двери по офсету
function drawDoors(left, right) {
    left.setAttribute("x", 70 - doorOffset);
    right.setAttribute("x", 110 + doorOffset);
}

async function connectArduino() {
    try {
        const port = await navigator.serial.requestPort();
        await port.open({ baudRate: 9600 });
        const reader = port.readable.getReader();
        while (true) {
            const { value, done } = await reader.read();
            if (done) break;
            const text = new TextDecoder().decode(value).trim();
            let floor = parseInt(text.replace(/[^0-9]/g, ''));
            if (floor >= 1 && floor <= 3) callElevator(floor);
        }
    } catch (e) { alert("Ошибка Serial: " + e.message); }
}

updateDisplay();
</script>
</body>
</html>
